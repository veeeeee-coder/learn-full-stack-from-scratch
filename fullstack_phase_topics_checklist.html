
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.root{padding:14px 4px 32px}
.summary-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 14px}
.stat-val{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.stat-lbl{font-size:12px;color:var(--color-text-secondary);margin-top:2px}
.phase{margin-bottom:10px;border-radius:var(--border-radius-lg);border:1px solid var(--color-border-tertiary);overflow:hidden}
.ph{display:flex;align-items:center;gap:8px;padding:11px 14px;cursor:pointer;user-select:none;background:var(--color-background-secondary)}
.ph:hover{background:var(--color-background-tertiary)}
.ph-badge{font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.ph-title{font-size:14px;font-weight:500;flex:1}
.ph-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.ph-prog{font-size:11px;color:var(--color-text-tertiary);white-space:nowrap}
.ph-bar-wrap{width:60px;height:4px;background:var(--color-border-tertiary);border-radius:2px;overflow:hidden}
.ph-bar{height:100%;border-radius:2px;background:var(--color-text-success);transition:width .3s}
.chev{font-size:11px;color:var(--color-text-tertiary);transition:transform .2s;flex-shrink:0}
.chev.open{transform:rotate(180deg)}
.ph-body{display:none;border-top:1px solid var(--color-border-tertiary)}
.ph-body.open{display:block}
.section{padding:10px 14px 2px}
.sec-title{font-size:11px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px;margin-bottom:10px}
.topic{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:var(--border-radius-md);border:1px solid var(--color-border-tertiary);background:var(--color-background-primary);cursor:pointer;transition:border-color .12s,background .12s}
.topic:hover{border-color:var(--color-border-secondary);background:var(--color-background-secondary)}
.topic.done{background:var(--color-background-success);border-color:var(--color-border-success)}
.cb{width:15px;height:15px;border-radius:3px;border:1.5px solid var(--color-border-secondary);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;margin-top:1px;transition:all .12s}
.topic.done .cb{background:var(--color-text-success);border-color:var(--color-text-success);color:#fff}
.t-name{font-size:12px;font-weight:500;line-height:1.4;color:var(--color-text-primary)}
.topic.done .t-name{color:var(--color-text-success)}
.t-hint{font-size:11px;color:var(--color-text-secondary);line-height:1.4;margin-top:2px}
.project-box{margin:2px 14px 12px;padding:10px 12px;border-radius:var(--border-radius-md);border:1px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
.proj-label{font-size:11px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.proj-item{font-size:12px;color:var(--color-text-secondary);padding:3px 0;line-height:1.5;display:flex;gap:6px}
.proj-item::before{content:"→";color:var(--color-text-tertiary);flex-shrink:0}
</style>

const done=new Set(JSON.parse(localStorage.getItem('fsd2')||'[]'));
function save(){try{localStorage.setItem('fsd2',JSON.stringify([...done]))}catch(e){}}

function allTopics(){let t=[];DATA.forEach(p=>p.sections.forEach(s=>s.topics.forEach(tp=>t.push(p.id+'|'+tp.n))));return t;}
function updateSummary(){
  const all=allTopics();
  const d=all.filter(k=>done.has(k)).length;
  document.getElementById('s-done').textContent=d;
  document.getElementById('s-total').textContent=all.length;
  document.getElementById('s-pct').textContent=Math.round(d/all.length*100)+'%';
}
function updatePhaseBar(pid){
  const p=DATA.find(x=>x.id===pid);
  const keys=[];p.sections.forEach(s=>s.topics.forEach(t=>keys.push(pid+'|'+t.n)));
  const d=keys.filter(k=>done.has(k)).length;
  document.getElementById('pbar'+pid).style.width=(d/keys.length*100)+'%';
  document.getElementById('pprog'+pid).textContent=d+'/'+keys.length;
}

function build(){
  const c=document.getElementById('pc');
  DATA.forEach(p=>{
    const totalTopics=p.sections.reduce((a,s)=>a+s.topics.length,0);
    const div=document.createElement('div');div.className='phase';
    div.innerHTML=`
    <div class="ph" onclick="tog(${p.id})">
      <span class="ph-badge" style="background:${p.bg};color:${p.color}">${p.label}</span>
      <span class="ph-title">${p.title}</span>
      <div class="ph-right">
        <span class="ph-prog" id="pprog${p.id}">0/${totalTopics}</span>
        <div class="ph-bar-wrap"><div class="ph-bar" id="pbar${p.id}" style="width:0%"></div></div>
        <span class="chev" id="chv${p.id}">▼</span>
      </div>
    </div>
    <div class="ph-body" id="pb${p.id}"></div>`;
    c.appendChild(div);
    const body=div.querySelector(`#pb${p.id}`);
    p.sections.forEach(s=>{
      const sec=document.createElement('div');sec.className='section';
      sec.innerHTML=`<div class="sec-title">${s.name}</div><div class="topic-grid" id="tg${p.id}_${s.name.replace(/\W/g,'_')}"></div>`;
      body.appendChild(sec);
      const grid=sec.querySelector('.topic-grid');
      s.topics.forEach(t=>{
        const key=p.id+'|'+t.n;
        const el=document.createElement('div');
        el.className='topic'+(done.has(key)?' done':'');
        el.innerHTML=`<span class="cb">${done.has(key)?'✓':''}</span><div><div class="t-name">${t.n}</div><div class="t-hint">${t.h}</div></div>`;
        el.onclick=()=>{
          if(done.has(key)){done.delete(key);el.classList.remove('done');el.querySelector('.cb').textContent=''}
          else{done.add(key);el.classList.add('done');el.querySelector('.cb').textContent='✓'}
          save();updatePhaseBar(p.id);updateSummary();
        };
        grid.appendChild(el);
      });
    });
    const pb=document.createElement('div');pb.className='project-box';
    pb.innerHTML=`<div class="proj-label">Phase project(s)</div>`+p.projects.map(pr=>`<div class="proj-item">${pr}</div>`).join('');
    body.appendChild(pb);
    updatePhaseBar(p.id);
  });
  updateSummary();
}

function tog(id){
  document.getElementById('pb'+id).classList.toggle('open');
  document.getElementById('chv'+id).classList.toggle('open');
}

build();
tog(1);
</script>
