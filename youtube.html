<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Clone</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles/general.css">
  <link rel="stylesheet" href="styles/header.css">
  <link rel="stylesheet" href="styles/video.css">
  <link rel="stylesheet" href="styles/sidebar.css">
</head>

<body>

 

  <div class="header">

    <div class="left-section">
      <img class="hamburger-menu" src="icons/hamburger-menu.svg">
      <img class="youtube-logo" src="icons/youtube-logo.svg">
    </div>

    <div class="middle-section">

      <input class="search-bar" type="text" placeholder="Search">

      <button class="search-button">
        <img class="search-icon" src="icons/search.svg">
      </button>

      <button class="voice-search-button">
        <img class="voice-search-icon" src="icons/voice-search-icon.svg">
      </button>

    </div>

    <div class="right-section">

      <img class="upload-icon" src="icons/upload.svg">

      <img class="youtube-apps-icon" src="icons/youtube-apps.svg">

      <div class="notifications-icon-container">
        <img class="notifications-icon" src="icons/notifications.svg">
        <div class="notifications-count">3</div>
      </div>

      <img class="current-user-picture" src="channel-pic/my-channel.jpeg">

    </div>

  </div>

  <!-- SIDEBAR -->

  <div class="sidebar">
    sidebar
  </div>

  <!-- VIDEOS -->

  <div class="video-grid">

    <!-- VIDEO 1 -->

    <div class="video-preview">

      <div class="thumbnail-row">
        <img class="thumbnail" src="thumbnails/hq720.avif">
        <div class="video-time">14:20</div>
      </div>

      <div class="video-info-grid">

        <div class="channel-picture">
          <img class="profile-picture" src="channel-pic/channels48_profile.jpg">
        </div>

        <div class="video-info">

          <p class="video-title">
            Major Moments of Season 3: Part 2 | Gilmore Girls
          </p>

          <p class="video-author">
            Gilmore Girls
          </p>

          <p class="video-stats">
            178K views &#183; 11 months ago
          </p>

        </div>

      </div>

    </div>

    <!-- VIDEO 2 -->

    <div class="video-preview">

      <div class="thumbnail-row">
        <img class="thumbnail" src="thumbnails/videoframe_11004.png">
        <div class="video-time">5:01</div>
      </div>

      <div class="video-info-grid">

        <div class="channel-picture">
          <img class="profile-picture" src="channel-pic/channels4_profile.jpg">
        </div>

        <div class="video-info">

          <p class="video-title">
            Elle Woods being iconic for almost 5 mins | Legally Blonde
          </p>

          <p class="video-author">
            dramatic
          </p>

          <p class="video-stats">
            5.3M views &#183; 4 years ago
          </p>

        </div>

      </div>

    </div>

    <!-- COPY THESE VIDEO BLOCKS TO ADD MORE VIDEOS -->

  </div>

</body>
</html>
